    let corrects = 0;
    let incorrects = 0;

    function renderQuiz() {
        const container = document.getElementById('quiz-content');
        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            const btns = item.opts.map((text, i) => 
                `<button class="option-btn" onclick="evaluateAns(${index}, ${i}, this)">${text}</button>`
            ).join('');

            card.innerHTML = `
                <span class="question-header">${index + 1}. ${item.q}</span>
                <div class="options-container">${btns}</div>
                <div id="fb-box-${index}" class="feedback"></div>
                <div id="ref-${index}" class="ref-box"><strong>Sugerencia:</strong> ${item.sug}</div>
            `;
            container.appendChild(card);
        });
    }

    window.evaluateAns = function(qIdx, optIdx, btn) {
        const data = quizData[qIdx];
        const buttons = btn.parentElement.querySelectorAll('.option-btn');
        const feedback = document.getElementById(`fb-box-${qIdx}`);
        const ref = document.getElementById(`ref-${qIdx}`);

        buttons.forEach(b => b.disabled = true);

        if (optIdx === data.ans) {
            btn.classList.add('correct');
            feedback.className = 'feedback fb-success';
            corrects++;
            document.getElementById('correct-total').innerText = corrects;
        } else {
            btn.classList.add('incorrect');
            buttons[data.ans].classList.add('correct');
            feedback.className = 'feedback fb-error';
            incorrects++;
            document.getElementById('incorrect-total').innerText = incorrects;
        }

        feedback.innerHTML = data.fbs[optIdx];
        feedback.style.display = 'block';
        ref.style.display = 'block';
    }

    renderQuiz();
</script>
